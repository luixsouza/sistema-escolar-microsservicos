<div class="page-header">
  <div class="title-group">
    <h2>Professores</h2>
    <p class="subtitle">{{ professores().length }} cadastrado{{ professores().length !== 1 ? 's' : '' }}</p>
  </div>
  <button mat-flat-button (click)="abrir()">
    <mat-icon>add</mat-icon> Novo Professor
  </button>
</div>

@if (professores().length) {
  <div class="table-card">
    <table mat-table [dataSource]="professores()">
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Professor</th>
        <td mat-cell *matCellDef="let p">
          <div class="cell-main">{{ p.nome }}</div>
          <div class="cell-sub">{{ p.email }}</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="titulacao">
        <th mat-header-cell *matHeaderCellDef>Titulacao</th>
        <td mat-cell *matCellDef="let p">
          <span class="chip chip-purple">{{ p.titulacao }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let p">
          <button mat-icon-button (click)="abrir(p)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="excluir(p)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>
  </div>
} @else {
  <div class="empty">
    <mat-icon>person</mat-icon>
    <p>Nenhum professor cadastrado</p>
  </div>
}
