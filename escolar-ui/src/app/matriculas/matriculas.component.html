<div class="page-header">
  <div class="title-group">
    <h2>Matriculas</h2>
    <p class="subtitle">{{ matriculas().length }} realizada{{ matriculas().length !== 1 ? 's' : '' }}</p>
  </div>
  <button mat-flat-button (click)="abrir()">
    <mat-icon>add</mat-icon> Nova Matricula
  </button>
</div>

@if (matriculas().length) {
  <div class="table-card">
    <table mat-table [dataSource]="matriculas()">
      <ng-container matColumnDef="aluno">
        <th mat-header-cell *matHeaderCellDef>Aluno</th>
        <td mat-cell *matCellDef="let m">
          <div class="cell-main">{{ m.alunoNome }}</div>
          <div class="cell-sub">{{ m.alunoMatricula }}</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="disciplina">
        <th mat-header-cell *matHeaderCellDef>Disciplina</th>
        <td mat-cell *matCellDef="let m">
          <div class="cell-main">{{ m.disciplinaNome }}</div>
          <div class="cell-sub">{{ m.cargaHoraria }}h</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let m">
          <button mat-icon-button color="warn" (click)="excluir(m)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
    </table>
  </div>
} @else {
  <div class="empty">
    <mat-icon>assignment</mat-icon>
    <p>Nenhuma matricula realizada</p>
  </div>
}
