<div class="page-header">
  <div class="title-group">
    <h2>Disciplinas</h2>
    <p class="subtitle">{{ disciplinas().length }} cadastrada{{ disciplinas().length !== 1 ? 's' : '' }}</p>
  </div>
  <button mat-flat-button (click)="abrir()">
    <mat-icon>add</mat-icon> Nova Disciplina
  </button>
</div>

@if (disciplinas().length) {
  <div class="table-card">
    <table mat-table [dataSource]="disciplinas()">
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Disciplina</th>
        <td mat-cell *matCellDef="let d">
          <div class="cell-main">{{ d.nome }}</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="cargaHoraria">
        <th mat-header-cell *matHeaderCellDef>Carga Horaria</th>
        <td mat-cell *matCellDef="let d">
          <span class="chip chip-green">{{ d.cargaHoraria }}h</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let d">
          <button mat-icon-button (click)="abrir(d)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="excluir(d)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
    </table>
  </div>
} @else {
  <div class="empty">
    <mat-icon>menu_book</mat-icon>
    <p>Nenhuma disciplina cadastrada</p>
  </div>
}
